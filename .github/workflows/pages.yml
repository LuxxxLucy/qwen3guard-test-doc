# Build the blog (main.typ -> index.html) and deploy it to GitHub Pages on
# every push to main. Fonts are vendored under
# vendor/dual-typst/assets/fonts, so no font-fetch step is needed; cetz is
# pulled from the Typst package registry at build time.

name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4
        with:
          typst-version: latest

      - name: Build HTML
        run: ./build.sh

      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
