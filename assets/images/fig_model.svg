<svg xmlns="http://www.w3.org/2000/svg" width="745" height="560" viewBox="0 0 745 560">
  <!-- title -->
  <text x="20" y="28" font-family="Roboto, sans-serif" font-size="14" fill="#222222">an autoregressive LM, used as a classifier</text>

  <!-- ===================================================================
       Layout (top to bottom): the token row stays horizontal so the
       prompt reads naturally; the forward pass flows downward.
       Input row of token boxes spans x=60..660.
       =================================================================== -->

  <!-- ===== 1. INPUT: token row ===== -->
  <!-- system prompt: 7 grey boxes, x=60..361 (box 36 wide, gap 7) -->
  <rect x="60"  y="56" width="36" height="26" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <rect x="103" y="56" width="36" height="26" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <rect x="146" y="56" width="36" height="26" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <rect x="189" y="56" width="36" height="26" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <rect x="232" y="56" width="36" height="26" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <rect x="275" y="56" width="36" height="26" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <rect x="318" y="56" width="36" height="26" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <!-- user text: 4 lighter boxes, x=375..560 -->
  <rect x="375" y="56" width="36" height="26" fill="#e6e6e6" stroke="#888888" stroke-width="1"/>
  <rect x="418" y="56" width="36" height="26" fill="#e6e6e6" stroke="#888888" stroke-width="1"/>
  <rect x="461" y="56" width="36" height="26" fill="#e6e6e6" stroke="#888888" stroke-width="1"/>
  <rect x="504" y="56" width="36" height="26" fill="#e6e6e6" stroke="#888888" stroke-width="1"/>
  <!-- Safety: accent box, last/rightmost token, x=575..660 -->
  <rect x="575" y="56" width="85" height="26" fill="#2a7f7f" stroke="#2a7f7f" stroke-width="1"/>
  <text x="617" y="74" font-family="Roboto, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Safety:</text>

  <!-- group braces + labels underneath -->
  <path d="M60 90 L60 96 L354 96 L354 90" fill="none" stroke="#888888" stroke-width="1"/>
  <text x="207" y="112" font-family="Roboto, sans-serif" font-size="13" fill="#222222" text-anchor="middle">system prompt (fixed)</text>
  <path d="M375 90 L375 96 L540 96 L540 90" fill="none" stroke="#888888" stroke-width="1"/>
  <text x="457" y="112" font-family="Roboto, sans-serif" font-size="13" fill="#222222" text-anchor="middle">user text</text>
  <text x="617" y="100" font-family="Roboto, sans-serif" font-size="12" fill="#2a7f7f" text-anchor="middle">last token</text>

  <!-- arrow: input row into the model -->
  <line x1="360" y1="124" x2="360" y2="150" stroke="#888888" stroke-width="1.5"/>
  <polygon points="360,150 355,140 365,140" fill="#888888"/>

  <!-- ===== 2. MODEL: transformer layers (stacked rectangles) ===== -->
  <rect x="60" y="156" width="600" height="14" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <rect x="60" y="172" width="600" height="14" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <rect x="60" y="188" width="600" height="14" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <rect x="60" y="204" width="600" height="14" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <text x="360" y="228" font-family="Roboto, sans-serif" font-size="13" fill="#222222" text-anchor="middle">transformer layers</text>

  <!-- arrow: model out to hidden states -->
  <line x1="360" y1="240" x2="360" y2="262" stroke="#888888" stroke-width="1.5"/>
  <polygon points="360,262 355,252 365,252" fill="#888888"/>

  <!-- ===== 3. HIDDEN STATES: one tick per position ===== -->
  <text x="20" y="270" font-family="Roboto, sans-serif" font-size="13" fill="#222222">hidden states</text>
  <!-- grey circles centered under each input box.
       system box centers: 78,121,164,207,250,293,336
       user box centers:   393,436,479,522
       Safety center:      617 -->
  <circle cx="78"  cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <circle cx="121" cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <circle cx="164" cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <circle cx="207" cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <circle cx="250" cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <circle cx="293" cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <circle cx="336" cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <circle cx="393" cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <circle cx="436" cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <circle cx="479" cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <circle cx="522" cy="286" r="6" fill="#cccccc" stroke="#888888" stroke-width="1"/>
  <!-- (not used) note over the grey ones -->
  <text x="300" y="312" font-family="Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="middle">(not used)</text>

  <!-- last hidden state: accent, larger -->
  <circle cx="617" cy="286" r="9" fill="#2a7f7f" stroke="#2a7f7f" stroke-width="1"/>
  <text x="617" y="312" font-family="Roboto, sans-serif" font-size="12" fill="#2a7f7f" text-anchor="middle">h_t (last position)</text>

  <!-- arrow: only h_t feeds the head -->
  <line x1="617" y1="318" x2="617" y2="344" stroke="#2a7f7f" stroke-width="1.5"/>
  <polygon points="617,344 612,334 622,334" fill="#2a7f7f"/>

  <!-- ===== 4. HEAD ===== -->
  <rect x="497" y="350" width="240" height="40" fill="#9fcccc" stroke="#2a7f7f" stroke-width="1"/>
  <text x="617" y="375" font-family="Roboto, sans-serif" font-size="13" fill="#222222" text-anchor="middle">language-modeling head  E</text>

  <!-- arrow: head out to logits -->
  <line x1="617" y1="396" x2="617" y2="418" stroke="#888888" stroke-width="1.5"/>
  <polygon points="617,418 612,408 622,408" fill="#888888"/>

  <!-- note: keep 3 of ~150,000 -->
  <text x="617" y="436" font-family="Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="middle">of ~150,000 vocabulary logits, keep 3</text>

  <!-- ===== 5. OUTPUT: three label bars (verdict) ===== -->
  <text x="20" y="490" font-family="Roboto, sans-serif" font-size="13" fill="#222222">verdict</text>
  <!-- baseline -->
  <line x1="497" y1="510" x2="737" y2="510" stroke="#888888" stroke-width="1"/>
  <!-- safe: short -->
  <rect x="510" y="478" width="46" height="32" fill="#9fcccc" stroke="#2a7f7f" stroke-width="1"/>
  <text x="533" y="528" font-family="Roboto, sans-serif" font-size="12" fill="#222222" text-anchor="middle">safe</text>
  <!-- unsafe: tallest = argmax -->
  <rect x="594" y="450" width="46" height="60" fill="#2a7f7f" stroke="#2a7f7f" stroke-width="1"/>
  <text x="617" y="528" font-family="Roboto, sans-serif" font-size="12" fill="#222222" text-anchor="middle" font-weight="bold">unsafe</text>
  <!-- argmax check -->
  <path d="M608 442 L614 448 L626 434" fill="none" stroke="#2a7f7f" stroke-width="2"/>
  <!-- controversial: short -->
  <rect x="678" y="480" width="46" height="30" fill="#9fcccc" stroke="#2a7f7f" stroke-width="1"/>
  <text x="701" y="528" font-family="Roboto, sans-serif" font-size="11" fill="#222222" text-anchor="middle">controversial</text>
</svg>
