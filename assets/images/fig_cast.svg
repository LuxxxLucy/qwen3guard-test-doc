<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280">
  <!-- title -->
  <text x="20" y="28" font-family="Roboto, sans-serif" font-size="14" fill="#222222">the model's next-token distribution</text>

  <!-- ===== LEFT: vocabulary distribution ===== -->
  <!-- baseline -->
  <line x1="20" y1="200" x2="320" y2="200" stroke="#888888" stroke-width="1"/>

  <!-- grey vocabulary bars + scattered teal label bars.
       baseline y=200, bars grow upward. -->
  <!-- 16 slots, x spacing 17, starting at x=28, bar width 9 -->
  <rect x="28"  y="160" width="9" height="40" fill="#cccccc"/>
  <rect x="45"  y="120" width="9" height="80" fill="#cccccc"/>
  <!-- teal: controversial (short) -->
  <rect x="62"  y="168" width="9" height="32" fill="#2a7f7f"/>
  <rect x="79"  y="140" width="9" height="60" fill="#cccccc"/>
  <rect x="96"  y="175" width="9" height="25" fill="#cccccc"/>
  <rect x="113" y="110" width="9" height="90" fill="#cccccc"/>
  <!-- teal: unsafe (tallest of the three) -->
  <rect x="130" y="95"  width="9" height="105" fill="#2a7f7f"/>
  <rect x="147" y="150" width="9" height="50" fill="#cccccc"/>
  <rect x="164" y="130" width="9" height="70" fill="#cccccc"/>
  <rect x="181" y="172" width="9" height="28" fill="#cccccc"/>
  <rect x="198" y="118" width="9" height="82" fill="#cccccc"/>
  <!-- teal: safe (short) -->
  <rect x="215" y="165" width="9" height="35" fill="#2a7f7f"/>
  <rect x="232" y="138" width="9" height="62" fill="#cccccc"/>
  <rect x="249" y="155" width="9" height="45" fill="#cccccc"/>
  <rect x="266" y="125" width="9" height="75" fill="#cccccc"/>
  <rect x="283" y="170" width="9" height="30" fill="#cccccc"/>

  <!-- labels under the three teal bars -->
  <text x="66"  y="222" font-family="Roboto, sans-serif" font-size="12" fill="#2a7f7f" text-anchor="middle">controversial</text>
  <text x="134" y="222" font-family="Roboto, sans-serif" font-size="12" fill="#2a7f7f" text-anchor="middle">unsafe</text>
  <text x="219" y="222" font-family="Roboto, sans-serif" font-size="12" fill="#2a7f7f" text-anchor="middle">safe</text>

  <!-- vocabulary axis label -->
  <text x="170" y="250" font-family="Roboto, sans-serif" font-size="13" fill="#222222" text-anchor="middle">vocabulary  (~150,000 tokens)</text>

  <!-- ===== MIDDLE: arrow ===== -->
  <text x="430" y="118" font-family="Roboto, sans-serif" font-size="13" fill="#222222" text-anchor="middle">keep the 3 label tokens, renormalize</text>
  <line x1="345" y1="135" x2="510" y2="135" stroke="#888888" stroke-width="1.5"/>
  <polygon points="510,135 500,130 500,140" fill="#888888"/>

  <!-- ===== RIGHT: P(y|x) ===== -->
  <text x="610" y="28" font-family="Roboto, sans-serif" font-size="14" fill="#222222" text-anchor="middle">P(y | x)</text>
  <!-- baseline -->
  <line x1="528" y1="200" x2="700" y2="200" stroke="#888888" stroke-width="1"/>

  <!-- three teal bars: safe short, unsafe tall, controversial short -->
  <rect x="538" y="165" width="26" height="35"  fill="#2a7f7f"/>
  <rect x="600" y="55"  width="26" height="145" fill="#2a7f7f"/>
  <rect x="662" y="170" width="26" height="30"  fill="#2a7f7f"/>

  <text x="551" y="222" font-family="Roboto, sans-serif" font-size="12" fill="#222222" text-anchor="middle">safe</text>
  <text x="613" y="222" font-family="Roboto, sans-serif" font-size="12" fill="#222222" text-anchor="middle">unsafe</text>
  <text x="675" y="222" font-family="Roboto, sans-serif" font-size="10" fill="#222222" text-anchor="middle">controversial</text>
</svg>
